<section class="hero">
  <div class="hero-card">

    <div class="hero-content">
      <p class="eyebrow">HÅLLBART MODE</p>

      <h1>Better clothing<br />for the planet</h1>

      <p class="hero-subtitle">
        Tidlösa plagg tillverkade med omtanke om människor och miljö.
      </p>

      <div class="hero-actions">
        <button class="primary-btn" (click)="shop()">Shoppa nyheter</button>
        <button class="secondary-btn">Se kollektioner</button>
      </div>

      <div class="hero-benefits">
        <span><img src="assets/icons/shipping.svg" alt=""> Fri frakt över 499 kr</span>
        <span><img src="assets/icons/returnarrows.svg" alt=""> 30 dagars retur</span>
        <span><img src="assets/icons/material.svg" alt=""> Hållbara material</span>
      </div>
    </div>

    <div class="hero-image">
      <img
        src="assets/images/clothesImgHero2.jpg"
        alt="Kläder på galge"
      />
    </div>
  </div>

  <app-popular-products></app-popular-products>
  <app-clothes-news></app-clothes-news>
</section>
